name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'tv-guide-app/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tv-guide-app/**'
      - '.github/workflows/test.yml'

jobs:
  app-unit:
    name: App Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tv-guide-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tv-guide-app/package-lock.json

      - run: npm ci

      - name: Data & type tests
        run: npx jest --verbose --no-coverage -- channels.test constants.test types.test deep-links.test service-groups.test

      - name: API & event logic tests
        run: npx jest --verbose --no-coverage -- api-fetch.test api-branches.test event-filtering.test group-events.test group-by-sport.test get-sizes-for-width.test

      - name: Hook tests
        run: npx jest --verbose --no-coverage -- hooks.test use-preferences.test use-preferences-native.test use-preferences-no-storage.test deep-links-runtime.test theme.test

      - name: Coverage check
        run: npx jest --coverage

  server-unit:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tv-guide-app/server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tv-guide-app/server/package-lock.json

      - run: npm ci

      - name: Channel & sport mapping tests
        run: npx jest --verbose --no-coverage -- channel-mapping.test sport-mapping.test status-mapping.test

      - name: Data fetch & processing tests
        run: npx jest --verbose --no-coverage -- fetch-events.test espn-dates.test cache.test dedup-filter.test league-enrichment.test

      - name: API endpoint tests
        run: npx jest --verbose --no-coverage -- api-endpoint.test

  server-integration:
    name: Server Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tv-guide-app/server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tv-guide-app/server/package-lock.json

      - run: npm ci

      - name: Rate limiting
        run: npx jest --verbose --no-coverage -- integration/rate-limiting.test

      - name: API key auth
        run: npx jest --verbose --no-coverage -- integration/api-key-auth.test

      - name: Cache behavior
        run: npx jest --verbose --no-coverage -- integration/cache-behavior.test

      - name: Error handling
        run: npx jest --verbose --no-coverage -- integration/error-handler.test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tv-guide-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tv-guide-app/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Onboarding flow
        run: npx playwright test onboarding.spec.ts

      - name: Guide navigation
        run: npx playwright test guide-navigation.spec.ts

      - name: Settings screen
        run: npx playwright test settings.spec.ts

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tv-guide-app/playwright-report/
          retention-days: 7

  coverage:
    name: Coverage Thresholds
    needs: [app-unit, server-unit, server-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            tv-guide-app/package-lock.json
            tv-guide-app/server/package-lock.json

      - name: Install app deps
        run: npm ci
        working-directory: tv-guide-app

      - name: Install server deps
        run: npm ci
        working-directory: tv-guide-app/server

      - name: App coverage (99%+ lines, 94%+ branches)
        run: npx jest --coverage
        working-directory: tv-guide-app

      - name: Server coverage (99%+ lines, 97%+ branches)
        run: npx jest --coverage
        working-directory: tv-guide-app/server

  deploy:
    name: Deploy to Render
    needs: [app-unit, server-unit, server-integration, e2e, coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
